version: '3.9'

# ── Shared network ─────────────────────────────────────────────────────────────

networks:
  taskfire:
    driver: bridge

# ── Named volumes ──────────────────────────────────────────────────────────────

volumes:
  redis_data:
  postgres_data:
  prometheus_data:

# ── Re-usable fragments ────────────────────────────────────────────────────────

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: '20m'
      max-file: '5'

# ── Services ───────────────────────────────────────────────────────────────────

services:

  # ── Redis ────────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    <<: [*restart, *logging]
    networks:
      - taskfire
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory-policy noeviction
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Postgres ─────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    <<: [*restart, *logging]
    networks:
      - taskfire
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-taskfire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskfire}
      POSTGRES_DB:       ${POSTGRES_DB:-taskfire}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-taskfire} -d ${POSTGRES_DB:-taskfire}']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # ── Go Worker ─────────────────────────────────────────────────────────────────

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    <<: [*restart, *logging]
    networks:
      - taskfire
    ports:
      - '9090:9090'
    environment:
      REDIS_URL:    ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql://taskfire:taskfire@postgres:5432/taskfire}
      WORKER_COUNT: ${WORKER_COUNT:-10}
      METRICS_PORT: ${METRICS_PORT:-9090}
      LOG_LEVEL:    ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:9090/metrics || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Node.js API ───────────────────────────────────────────────────────────────

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    <<: [*restart, *logging]
    networks:
      - taskfire
    ports:
      - '3000:3000'
    environment:
      PORT:         ${API_PORT:-3000}
      REDIS_URL:    ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql://taskfire:taskfire@postgres:5432/taskfire}
      CORS_ORIGIN:  ${CORS_ORIGIN:-http://localhost}
      LOG_LEVEL:    ${LOG_LEVEL:-info}
      JWT_SECRET:   ${JWT_SECRET:-change-me-in-production}
      NODE_ENV:     ${NODE_ENV:-production}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── React Dashboard ───────────────────────────────────────────────────────────

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_WS_URL:  ${VITE_WS_URL:-}
    <<: [*restart, *logging]
    networks:
      - taskfire
    ports:
      - '5173:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:80/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    <<: [*restart, *logging]
    networks:
      - taskfire
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Prometheus ────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    <<: [*restart, *logging]
    networks:
      - taskfire
    ports:
      - '9091:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      - worker
      - api
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://localhost:9090/-/healthy || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
