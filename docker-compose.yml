version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskfire
      POSTGRES_PASSWORD: taskfire
      POSTGRES_DB: taskfire
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U taskfire']
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      WORKER_COUNT: '10'
      METRICS_PORT: '9090'
    ports:
      - '9090:9090'
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      PORT: '3001'
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://taskfire:taskfire@postgres:5432/taskfire
      CORS_ORIGIN: '*'
    ports:
      - '3001:3001'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - dashboard
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - '9091:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
