global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'taskfire-worker'
    static_configs:
      - targets: ['worker:9090']
    metrics_path: /metrics

  - job_name: 'taskfire-api'
    static_configs:
      - targets: ['api:3001']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
