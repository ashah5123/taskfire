# ── Rate-limiting zone ────────────────────────────────────────────────────────
# 10 MB shared memory, keyed by client IP.  Allows 100 requests/minute per IP.
# Bursts of up to 20 requests are queued; beyond that nginx returns 429.
limit_req_zone $binary_remote_addr zone=per_ip:10m rate=100r/m;
limit_req_status 429;

# ── Upstream definitions ──────────────────────────────────────────────────────

upstream api_backend {
    server api:3001;
    keepalive 32;
}

# ── Server block ──────────────────────────────────────────────────────────────

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────────────

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ── Global security headers ───────────────────────────────────────────────

    add_header X-Frame-Options           "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options    "nosniff"                     always;
    add_header X-XSS-Protection          "1; mode=block"               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src  'self' 'unsafe-inline'; \
         style-src   'self' 'unsafe-inline'; \
         img-src     'self' data: blob:; \
         font-src    'self'; \
         connect-src 'self' ws: wss:; \
         frame-ancestors 'none';"
        always;

    # ── Timeouts ─────────────────────────────────────────────────────────────

    client_max_body_size    4m;
    client_body_timeout     12s;
    client_header_timeout   12s;
    send_timeout            12s;
    keepalive_timeout       65s;

    # ── API reverse proxy ─────────────────────────────────────────────────────

    location /api/ {
        limit_req zone=per_ip burst=20 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        proxy_buffer_size          8k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }

    # ── WebSocket upgrade ─────────────────────────────────────────────────────

    location /ws {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        # WebSocket connections are long-lived; do not rate-limit the
        # handshake separately — the /api/ limit covers the upgrade request.
    }

    # ── React SPA static files ────────────────────────────────────────────────

    location / {
        limit_req zone=per_ip burst=20 nodelay;

        # Serve pre-compressed .gz files when the client accepts gzip.
        gzip_static on;

        # SPA fallback: unknown paths all load index.html and the client-side
        # router takes over.  Known asset paths fall through to the try_files
        # directive and return 404 if the file is genuinely missing.
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for fingerprinted assets (JS/CSS bundles from Vite).
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache index.html so users always get the latest shell.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires    -1;
    }

    # ── Health check (used by docker / load balancers) ────────────────────────

    location = /health {
        access_log  off;
        return 200  "ok\n";
        add_header  Content-Type text/plain;
    }

    # ── Block hidden files ────────────────────────────────────────────────────

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
