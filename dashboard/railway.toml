# ── Taskfire Dashboard — Railway service configuration ────────────────────────
#
# Set this service's Root Directory to "dashboard/" in the Railway dashboard.
#
# Build-time variables — set these under Variables (not deploy-time env vars)
# because Vite bakes them into the static bundle at build time:
#
#   VITE_API_URL = https://${{api.RAILWAY_PUBLIC_DOMAIN}}
#   VITE_WS_URL  = wss://${{api.RAILWAY_PUBLIC_DOMAIN}}
#
# The dashboard is a static nginx container — it has no runtime env vars.
# Railway exposes it on port 80 automatically.

[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns  = ["src/**", "public/**", "package.json", "vite.config.ts", "nginx.conf"]

[deploy]
healthcheckPath         = "/"
healthcheckTimeout      = 60
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 10
