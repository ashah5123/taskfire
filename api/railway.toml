# ── Taskfire API — Railway service configuration ──────────────────────────────
#
# Set this service's Root Directory to "api/" in the Railway dashboard.
#
# Required environment variables (Railway dashboard → Variables):
#   REDIS_URL    = ${{Redis.REDIS_URL}}
#   DATABASE_URL = ${{Postgres.DATABASE_URL}}
#   JWT_SECRET   = <run: openssl rand -hex 32>
#
# Optional:
#   NODE_ENV     = production
#   LOG_LEVEL    = info
#   CORS_ORIGIN  = https://${{dashboard.RAILWAY_PUBLIC_DOMAIN}}
#
# Railway automatically injects PORT into every service.  The Fastify server
# already binds to process.env.PORT — no changes needed.

[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns  = ["src/**/*.ts", "package.json", "tsconfig.json"]

[deploy]
healthcheckPath         = "/health"
healthcheckTimeout      = 120
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 10
