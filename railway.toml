# ── Taskfire — Railway deployment configuration ────────────────────────────────
#
# This is the root Railway configuration for the Taskfire monorepo.
# The project deploys as five separate Railway services:
#
#   Service     Source              Builder
#   ─────────   ──────────────────  ──────────────────────────────────────────
#   postgres    Railway plugin      Managed PostgreSQL 15
#   redis       Railway plugin      Managed Redis 7
#   worker      worker/             Multi-stage Dockerfile (Go static binary)
#   api         api/                Multi-stage Dockerfile (Node.js 20)
#   dashboard   dashboard/          Multi-stage Dockerfile (Vite → nginx)
#
# ── Quick-start ────────────────────────────────────────────────────────────────
#
#   1. Create a new Railway project and click "Add Service → GitHub Repo".
#   2. Add the managed plugins: Railway PostgreSQL and Railway Redis.
#      Railway will inject DATABASE_URL and REDIS_URL automatically.
#   3. Add three services pointing to this repo, each with a different
#      Root Directory (worker/, api/, dashboard/).
#   4. Set the per-service environment variables listed below in the
#      Railway dashboard under each service → Variables.
#   5. Deploy.  Railway builds each service in parallel.
#
# ── Service: worker ───────────────────────────────────────────────────────────
#
#   Root Directory : worker/
#   Builder        : Dockerfile  (worker/Dockerfile)
#
#   Required variables (set in Railway dashboard):
#     REDIS_URL    = ${{Redis.REDIS_URL}}
#     DATABASE_URL = ${{Postgres.DATABASE_URL}}
#
#   Optional variables:
#     WORKER_MIN   = 2
#     WORKER_MAX   = 16
#     METRICS_PORT = 9090
#     LOG_LEVEL    = info
#
# ── Service: api ──────────────────────────────────────────────────────────────
#
#   Root Directory : api/
#   Builder        : Dockerfile  (api/Dockerfile)
#
#   Required variables:
#     REDIS_URL    = ${{Redis.REDIS_URL}}
#     DATABASE_URL = ${{Postgres.DATABASE_URL}}
#     JWT_SECRET   = <generate: openssl rand -hex 32>
#
#   Optional variables:
#     NODE_ENV     = production
#     LOG_LEVEL    = info
#     CORS_ORIGIN  = https://${{dashboard.RAILWAY_PUBLIC_DOMAIN}}
#
#   Railway injects PORT automatically — the API reads process.env.PORT.
#
# ── Service: dashboard ────────────────────────────────────────────────────────
#
#   Root Directory : dashboard/
#   Builder        : Dockerfile  (dashboard/Dockerfile)
#
#   Build arguments (Railway dashboard → service → Variables → Build):
#     VITE_API_URL = https://${{api.RAILWAY_PUBLIC_DOMAIN}}
#     VITE_WS_URL  = wss://${{api.RAILWAY_PUBLIC_DOMAIN}}
#
# ── Managed plugins ───────────────────────────────────────────────────────────
#
#   PostgreSQL: Railway Dashboard → New Service → Database → Add PostgreSQL
#     Provides: DATABASE_URL  (inject into worker + api)
#
#   Redis:      Railway Dashboard → New Service → Database → Add Redis
#     Provides: REDIS_URL     (inject into worker + api)
#
# ──────────────────────────────────────────────────────────────────────────────
# The sections below are the default build/deploy settings that Railway applies
# when this root is used as the service root.  In practice, point each Railway
# service at its own subdirectory so Railway picks up that service's railway.toml.
# ──────────────────────────────────────────────────────────────────────────────

[build]
builder = "DOCKERFILE"
dockerfilePath = "api/Dockerfile"
buildContext    = "api"

[deploy]
healthcheckPath    = "/health"
healthcheckTimeout = 300
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 10
